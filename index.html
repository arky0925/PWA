<!DOCTYPE html>
<html>
<head>
	<title>Your App</title>
	<!-- 拡大縮小禁止 -->
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
	<link rel="manifest" href="manifest.json">
	<link rel="stylesheet" href="css/style.css">
	<link rel="stylesheet" href="css/reset.css">
	<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<script>
if ('serviceWorker' in navigator) {
	window.addEventListener('load', () => {
	navigator.serviceWorker.register('sw.js').then(registration => {
	console.log('ServiceWorker registration successful with scope: ', registration.scope);
	}, err => {
	console.log('ServiceWorker registration failed: ', err);
	}).catch(err => {
	console.log(err)
	});
	});
}
</script>
</head>
<body>
	<header>
		PWA
		 <span id="menu-icon" class="material-icons">menu</span>
	</header>
	<main>
		<img class="styled-image" src="images/header.jpg">
			    <h1>データを入力してスプレッドシートに追加</h1>
    <form id="dataForm">
        <label for="name">名前:</label>
        <input type="text" id="name" name="name" required><br>
        
        <label for="age">年齢:</label>
        <input type="number" id="age" name="age" required><br>
        
        <button type="submit">追加</button>
    </form>

    <script>
        const SPREADSHEET_ID = '1skTko6HuozGEPrxPP4ZyQU7YVKYwJsyVLM1vutMzWx4'; // スプレッドシートのID
        const API_KEY = 'AIzaSyBo1IG8QEd9YnmVSioPng7xW5ls7hJ9lX0'; // 作成したAPIキー

        document.getElementById('dataForm').addEventListener('submit', function(event) {
            event.preventDefault(); // フォームのデフォルトの送信を防ぐ

            const name = document.getElementById('name').value;
            const age = document.getElementById('age').value;

            // Google Sheetsにデータを追加
            const values = [[name, age]];
            const body = {
                values: values
            };

            fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/Sheet1!A:B:append?valueInputOption=RAW&key=${API_KEY}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(body)
            })
            .then(response => {
                if (response.ok) {
                    alert('データがスプレッドシートに追加されました。');
                    document.getElementById('dataForm').reset(); // フォームをリセット
                } else {
                    alert('データの追加に失敗しました。');
                }
            })
            .catch(error => {
                console.error('エラー:', error);
            });
        });
    </script>
		<div class="icon-grid">
			<div class="app-block">
				<span class="material-icons">notifications_none</span>
				<span>News</span>
				<span>お知らせ</span>
			</div>
			<div class="app-block" id="couponButton">
				<span class="material-icons">payment</span>
				<span>Coupon</span>
				<span>クーポン</span>
			</div>
			<div class="app-block">
				<span class="material-icons">local_activity</span>
				<span>Stamp</span>
				<span>スタンプ</span>
			</div>
			<div class="app-block">
				<span class="material-icons">account_circle</span>
				<span>Profile</span>
				<span>プロフィール</span>
			</div>
			<div class="app-block">
				<span class="material-icons">menu_book</span>
				<span>Memory</span>
				<span>思い出</span>
			</div>
			<div class="app-block">
				<span class="material-icons">auto_awesome</span>
				<span>Knowledge</span>
				<span>ノウハウ</span>
			</div>
		</div>
	</main>
	<footer>
		<button id="homeButton">
			<span class="material-icons">home</span>
			<span>ホーム</span>
		</button>
		<button id="couponButton">
			<span class="material-icons">payment</span>
			<span>クーポン</span>
		</button>
		<button id="memoryButton">
			<span class="material-icons">menu_book</span>

		</button>
		<button id="stampButton">
			<span class="material-icons">local_activity</span>
			<span>スタンプ</span>

		<button id="knowledgeButton">
			<span class="material-icons">auto_awesome</span>

		</button>
	</footer>

	<!-- サイドメニュー -->

</body>
