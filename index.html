<!DOCTYPE html>
<html>
<head>
	<title>Your App</title>
	<!-- 拡大縮小禁止 -->
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
	<link rel="manifest" href="manifest.json">
	<link rel="stylesheet" href="css/style.css">
	<link rel="stylesheet" href="css/reset.css">
	<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<script>
if ('serviceWorker' in navigator) {
	window.addEventListener('load', () => {
	navigator.serviceWorker.register('sw.js').then(registration => {
	console.log('ServiceWorker registration successful with scope: ', registration.scope);
	}, err => {
	console.log('ServiceWorker registration failed: ', err);
	}).catch(err => {
	console.log(err)
	});
	});
}
</script>
</head>
<body>
	<header>
		PWA
		 <span id="menu-icon" class="material-icons">menu</span>
	</header>
	<main>
		<img class="styled-image" src="images/header.jpg">
		<form id="myForm">
  <input type="text" name="name" placeholder="名前" required><br>
  <input type="email" name="email" placeholder="メールアドレス" required><br>
  <textarea name="message" placeholder="メッセージ" required></textarea><br>
  <button type="submit">送信</button>
</form>

<script>
  document.getElementById("myForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const data = Object.fromEntries(formData.entries());

    const response = await fetch("https://script.google.com/macros/s/AKfycbzZB6gIvvEE3Pi_oOho8veg_eKKJxPMBySfcs7QQha_AYQN9TCjbHDGBfkbdgHpyetm/exec", {
      method: "POST",
      body: JSON.stringify(data),
      headers: { "Content-Type": "application/json" }
    });

    if (response.ok) {
      alert("送信成功！");
    } else {
      alert("送信失敗");
    }
  });
</script>
		<div class="icon-grid">
			<div class="app-block">
				<span class="material-icons">notifications_none</span>
				<span>News</span>
				<span>お知らせ</span>
			</div>
			<div class="app-block" id="couponButton">
				<span class="material-icons">payment</span>
				<span>Coupon</span>
				<span>クーポン</span>
			</div>
			<div class="app-block">
				<span class="material-icons">local_activity</span>
				<span>Stamp</span>
				<span>スタンプ</span>
			</div>
			<div class="app-block">
				<span class="material-icons">account_circle</span>
				<span>Profile</span>
				<span>プロフィール</span>
			</div>
			<div class="app-block">
				<span class="material-icons">menu_book</span>
				<span>Memory</span>
				<span>思い出</span>
			</div>
			<div class="app-block">
				<span class="material-icons">auto_awesome</span>
				<span>Knowledge</span>
				<span>ノウハウ</span>
			</div>
		</div>
	</main>
	<footer>
		<button id="homeButton">
			<span class="material-icons">home</span>
			<span>ホーム</span>
		</button>
		<button id="couponButton">
			<span class="material-icons">payment</span>
			<span>クーポン</span>
		</button>
		<button id="memoryButton">
			<span class="material-icons">menu_book</span>
			<span>思い出</span>
		</button>
		<button id="stampButton">
			<span class="material-icons">local_activity</span>
			<span>スタンプ</span>
		</button>
		<button id="knowledgeButton">
			<span class="material-icons">auto_awesome</span>
			<span>ノウハウ</span>
		</button>
	</footer>

	<!-- サイドメニュー -->
	<div class="side-menu" id="side-menu">
	<div class="side-menu-header">
		<span id="close-menu" class="material-icons">highlight_off</span>
	</div>
	<ul>
		<li><a href="#">メニュー1</a></li>
		<li><a href="#">メニュー2</a></li>
		<li><a href="#">メニュー3</a></li>
		<li><a href="#">メニュー4</a></li>
	</ul>
	</div>

	<script src="script.js"></script>
</body>
</html>
