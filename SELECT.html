<!DOCTYPE html>
<html lang="ja">
<head>
	<title>SELECT</title>
	<!-- 拡大縮小禁止 -->
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
	<link rel="manifest" href="manifest.json">
	<link rel="stylesheet" href="css/style.css">
	<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<script>
if ('serviceWorker' in navigator) {
	window.addEventListener('load', () => {
	navigator.serviceWorker.register('sw.js').then(registration => {
	console.log('ServiceWorker registration successful with scope: ', registration.scope);
	}, err => {
	console.log('ServiceWorker registration failed: ', err);
	}).catch(err => {
	console.log(err)
	});
	});
}
</script>
</head>
<body>
	<header>
	PWA
	</header>
	<main>
		<h2>スプレッドシートのデータ</h2>
		<button id="fetchDataButton">データを取得</button>
<!--		<button id="clearCacheButton">キャッシュをクリア</button> -->
		<table id="dataTable">
			<thead>
				<tr>
					<th>チェックボックス</th>
					<th>料理</th>
					<th>備考欄</th>
				</tr>
			</thead>
			<tbody id="dataDisplay"></tbody>
		</table>
	</main>
	<footer>
		<button id="homeButton">
			<span class="material-icons">home</span>
			<span>ホーム</span>
		</button>
		<button id="couponButton">
			<span class="material-icons">payment</span>
			<span>クーポン</span>
		</button>
		<button id="memoryButton">
			<span class="material-icons">menu_book</span>
			<span>思い出</span>
		</button>
		<button id="stampButton">
			<span class="material-icons">local_activity</span>
			<span>スタンプ</span>
		</button>
		<button id="knowledgeButton">
			<span class="material-icons">auto_awesome</span>
			<span>ノウハウ</span>
		</button>
	</footer>

	<script src="SELECT.js"></script>
	<script src="script.js"></script>
</body>
</html>
